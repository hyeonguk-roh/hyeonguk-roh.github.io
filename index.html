<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/game-grid.css">
    <link rel="stylesheet" href="styles/theme.css">
  </head>
  <body>
    <header>
      <h1>Arcade Hub</h1>
      <div class="controls">
        <input type="text" id="searchBar" placeholder="Search games...">
        <select id="categoryFilter">
            <option value="all">All Categories</option>
            <option value="puzzle">Puzzle</option>
            <option value="action">Action</option>
            <option value="strategy">Strategy</option>
        </select>
        <button id="themeToggle">Toggle Theme</button>
      </div>
    </header>

    <main>
      <div class="game-grid" id="gameGrid">
        <!-- Games will be dynamically loaded here -->
      </div>
    </main>

    <footer>
      <p>&copy; 2023 Arcade Hub. All rights reserved.</p>
    </footer>

    <script src="scripts/main.js"></script>
    <script src="scripts/game-loader.js"></script>
  </body>
</html>
